<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriNova Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Roboto', sans-serif;}
body { scroll-behavior: smooth; background:#fdfdfd; }

.hero { 
    background: url('https://i.ibb.co/spY34QHd/hero-img.jpg') center/cover no-repeat; 
    height: 90vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; color:#fff; position:relative;
}
.hero img.logo { position:absolute; top:20px; left:20px; width:120px; }
.hero h1 { font-size: 3rem; margin-bottom: 15px; text-shadow: 2px 2px 8px rgba(0,0,0,0.5);}
.hero p { font-size:1.2rem; margin-bottom:20px; text-shadow: 1px 1px 6px rgba(0,0,0,0.5);}
.hero button { padding:15px 30px; font-size:1.2rem; border:none; background:#28a745; color:white; cursor:pointer; border-radius:5px; }
.hero button:hover { background:#218838; }

.products { padding:50px 10px; max-width:1200px; margin:auto; }
.products h2 { text-align:center; margin-bottom:30px; font-size:2rem; color:#333; }

.carousel { display:flex; overflow-x:auto; gap:20px; padding-bottom:10px; }
.carousel::-webkit-scrollbar { display:none; }

.product-card { flex:0 0 250px; background:white; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); padding:15px; text-align:center; }
.product-card img { width:100%; height:200px; object-fit:cover; border-radius:10px; }
.product-card h3 { margin:10px 0; }
.product-card p { font-weight:bold; }
.product-card button { margin-top:10px; padding:10px 20px; border:none; background:#007bff; color:white; border-radius:5px; cursor:pointer; }

.cart-btn { position:fixed; bottom:80px; right:20px; background:#ffc107; border:none; border-radius:50%; width:60px; height:60px; font-size:1.5rem; cursor:pointer; }
.cart-count { position:absolute; top:-5px; right:-5px; background:red; color:white; width:20px; height:20px; border-radius:50%; font-size:0.8rem; }

.cart-drawer { position:fixed; top:0; right:-100%; width:320px; height:100%; background:white; transition:0.3s; padding:20px; display:flex; flex-direction:column; }
.cart-drawer.open { right:0; }
.cart-items { flex:1; overflow-y:auto; }
.cart-item { display:flex; justify-content:space-between; margin-bottom:15px; }
.cart-item img { width:50px; height:50px; }

.cart-drawer input { width:100%; padding:10px; margin-bottom:10px; }
.cart-drawer button { padding:10px; background:#28a745; color:white; border:none; }

.whatsapp-btn { position:fixed; bottom:20px; right:20px; background:#25D366; border-radius:50%; width:60px; height:60px; display:flex; justify-content:center; align-items:center; font-size:1.5rem; color:white; }
</style>
</head>

<body>

<section class="hero">
    <img class="logo" src="https://i.ibb.co/Y77s61K9/AGRINOVA.webp">
    <h1>AgriNova Foods</h1>
    <p>Fresh Find with Best Prices</p>
    <button onclick="document.getElementById('products').scrollIntoView()">Shop Now</button>
</section>

<section class="products" id="products">
    <h2>Our Products</h2>
    <div class="carousel" id="product-carousel"></div>
</section>

<button class="cart-btn" id="cart-btn">🛒 <span id="cart-count">0</span></button>

<div class="cart-drawer" id="cart-drawer">
    <h3>Your Cart</h3>
    <div class="cart-items" id="cart-items"></div>
    <input type="text" id="customer-name" placeholder="Your Name">
    <input type="text" id="customer-phone" placeholder="Phone Number">
    <button id="send-order">Send Order</button>
</div>

<a href="https://wa.me/919969984461" target="_blank" class="whatsapp-btn">📱</a>

<script>
const products = [
    { name: 'Export Fruit', price: 1200, img:'https://i.ibb.co/qMJZVYhG/export-fruit.jpg', unit:'500gm'},
    { name: 'Mix Fruits', price: 750, img:'https://i.ibb.co/rGPBW6Cs/mix-fruits.jpg', unit:'500gm'},
    { name: 'Mix Vegi', price: 550, img:'https://i.ibb.co/B2hj1JPW/mix-vegi-285.png', unit:'500gm'},
    { name: 'Dried Cherry', price: 1800, img:'https://i.ibb.co/zWH87bRp/dried-cheery.jpg', unit:'500gm'},
    { name: 'Dried Broccoli', price: 500, img:'https://i.ibb.co/dsRDxsRh/dried-brocli.jpg', unit:'500gm'}
];

const carousel = document.getElementById('product-carousel');
const cartBtn = document.getElementById('cart-btn');
const cartDrawer = document.getElementById('cart-drawer');
const cartItemsDiv = document.getElementById('cart-items');
const cartCount = document.getElementById('cart-count');
let cart = [];

products.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.unit} - ₹${p.price}</p>
        <button onclick="addToCart(${i})">Add</button>
    `;
    carousel.appendChild(card);
});

function addToCart(i){ cart.push(products[i]); updateCart(); }
function updateCart(){
    cartCount.innerText = cart.length;
    cartItemsDiv.innerHTML = '';
    cart.forEach((item,i)=>{
        cartItemsDiv.innerHTML += `
            <div class="cart-item">
                <img src="${item.img}">
                <div>${item.name} ₹${item.price}</div>
                <button onclick="removeItem(${i})">❌</button>
            </div>`;
    });
}
function removeItem(i){ cart.splice(i,1); updateCart(); }

cartBtn.onclick = ()=> cartDrawer.classList.toggle('open');

document.getElementById('send-order').addEventListener('click',()=>{
    const name = document.getElementById('customer-name').value;
    const phone = document.getElementById('customer-phone').value;

    if(!name || !phone || cart.length===0){
        alert('Please fill all details and add at least one item to cart.');
        return;
    }

    const itemsList = cart.map(i=>`${i.name} (${i.unit}) - ₹${i.price}`).join('%0A');

    const whatsappMsg = `*New Order - AgriNova*%0A%0AName: ${name}%0APhone: ${phone}%0A%0AOrder:%0A${itemsList}`;

    const whatsappNumber = "919969984461";

    window.open(`https://wa.me/${whatsappNumber}?text=${whatsappMsg}`, '_blank');

    cart = [];
    updateCart();
    document.getElementById('customer-name').value='';
    document.getElementById('customer-phone').value='';
    cartDrawer.classList.remove('open');
});
</script>

</body>
</html>
